name: Build Inbonha The Hedgehog

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ==========================================
  # JOB 1: BUILD NO LINUX
  # ==========================================
  build-linux:
    name: Build on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar dependências gráficas
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make libasound2-dev libx11-dev libxrandr-dev \
                                  libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev \
                                  libxinerama-dev libwayland-dev libxkbcommon-dev git

      - name: Compilar e Instalar Raylib (Source)
        run: |
          # Baixa apenas o branch principal da versão 5.0 para ser rápido
          git clone --depth 1 --branch 5.0 https://github.com/raysan5/raylib.git
          cd raylib/src
          make PLATFORM=PLATFORM_DESKTOP
          sudo make install
          # Isso instalará a biblioteca em /usr/local/lib, onde o GCC do Linux irá encontrá-la.

      - name: Compilar Projeto (Shell Script)
        run: bash build.sh -compile
        # Nota: Como o projeto tem um Makefile excelente,
        # você também poderia usar apenas 'make compile' aqui.

  # ==========================================
  # JOB 2: BUILD NO WINDOWS
  # ==========================================
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Verificar se libraylib.a existe
        # Este passo ajuda a debugar. Se falhar aqui, o arquivo não subiu para o GitHub.
        run: |
          if (-not (Test-Path "lib\libraylib.a")) {
              Write-Error "O arquivo lib\libraylib.a não foi encontrado! Verifique seu .gitignore e faça o commit do arquivo."
              exit 1
          }

      - name: Compilar Projeto (PowerShell)
        run: .\build.ps1 -compile
